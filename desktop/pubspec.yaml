name: photosync_desktop
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 跨平台共享
  photosync_common:
    path: ../common
  # HTTP服务器
  shelf: ^1.4.1
  shelf_multipart: ^1.0.0
  shelf_router: ^1.1.4
  # 网络
  dio: ^5.4.0
  udp: ^5.0.3
  http: ^1.1.0
  # UI
  google_fonts: ^6.1.0
  flutter_staggered_grid_view: ^0.7.0
  # 工具
  path_provider: ^2.1.1
  path: ^1.8.3
  sqlite3: ^2.1.0
  sqflite_common_ffi: ^2.3.2
  intl: ^0.19.0
  crypto: ^3.0.3
  image: ^4.1.3
  # 状态管理
  flutter_bloc: ^8.1.3
  provider: ^6.1.1
  # 窗口管理
  window_manager: ^0.3.7
  # 文件系统
  file_selector: ^1.0.1
  # 网络状态
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  # 通知
  local_notifier: ^0.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
