name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Get all dependencies
        run: |
          cd common && flutter pub get
          cd ../mobile && flutter pub get
          cd ../desktop && flutter pub get

      - name: Run tests
        run: |
          cd common && flutter test
          cd ../mobile && flutter test
          cd ../desktop && flutter test

      - name: Build APK
        run: |
          cd mobile
          flutter build apk --release

      - name: Build Linux
        run: |
          cd desktop
          flutter build linux --release

      - name: Package Linux bundle
        run: |
          cd desktop/build/linux/x64/release
          tar czf photosync-linux-x64.tar.gz bundle/
          mv photosync-linux-x64.tar.gz ../../../../../../

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            mobile/build/app/outputs/flutter-apk/app-release.apk
            photosync-linux-x64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
