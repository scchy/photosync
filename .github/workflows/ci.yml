name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Common - Get dependencies
        run: cd common && flutter pub get

      - name: Common - Analyze
        run: cd common && flutter analyze --fatal-infos

      - name: Mobile - Get dependencies
        run: cd mobile && flutter pub get

      - name: Mobile - Analyze
        run: cd mobile && flutter analyze --fatal-infos

      - name: Desktop - Get dependencies
        run: cd desktop && flutter pub get

      - name: Desktop - Analyze
        run: cd desktop && flutter analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Common - Get dependencies
        run: cd common && flutter pub get

      - name: Common - Test
        run: cd common && flutter test

      - name: Mobile - Get dependencies
        run: cd mobile && flutter pub get

      - name: Mobile - Test
        run: cd mobile && flutter test

      - name: Desktop - Get dependencies
        run: cd desktop && flutter pub get

      - name: Desktop - Test
        run: cd desktop && flutter test

  build-mobile:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          cd mobile
          flutter pub get
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: photosync-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

  build-desktop:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Build Linux
        run: |
          cd desktop
          flutter pub get
          flutter build linux --release

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: photosync-linux
          path: desktop/build/linux/x64/release/bundle/
